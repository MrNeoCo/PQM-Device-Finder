<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Device Finder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Device Finder</h1>

</div>

<script src="script.js"></script>

</body>
</html>
